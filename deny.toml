[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
]
all-features = true

[advisories]
unmaintained = 'workspace'
yanked = 'deny'
ignore = [
]

[bans]
deny = [
    { crate = "openssl-sys", use-instead = "rustls" },
    { crate = "openssl", use-instead = "rustls" },
    { crate = "aws-lc-sys", use-instead = "ring" },
    { crate = "cmake", use-instead = "cc" },
    # Ideally this is banned, but there are just far too many users of it :(
    # { crate = "chrono", use-instead = "time", wrappers = [
    #     "expect-json",
    #     "k8s-openapi",
    #     "kube-client",
    #     "kube-core",
    #     "kube-leader-election",
    #     # 
    #     "postgres-types",
    #     "rusqlite",
    # ] },
]
multiple-versions = "deny"
skip = [
    { crate = "object@0.32.2", reason = "transitive dependency due to backtrace, backtrace is updated, but stable-eyre using a feature that doesn't exist any longer, and can't update, sigh" },
    #{ crate = "getrandom@0.2.17", reason = "ring" },
    { crate = "miniz_oxide@0.7.4", reason = "pprof_util carries two different versions transitively" },
    { crate = "prost@0.13.5", reason = "pprof_util has an outdated version" },
    { crate = "prost-derive@0.13.5", reason = "pprof_util has an outdated version" },
    { crate = "indexmap@1.9.3", reason = "several users of old version in corrosion crates" },
    { crate = "fallible-iterator@0.2.0", reason = "several users of old version in corrosion crates" },
    { crate = "bitflags@1.3.2", reason = "corrosion again" },
]
skip-tree = [
    { crate = "thiserror@1.0.69", reason = "many crates use this old version" },
    { crate = "hashbrown:<0.16.0", reason = "we're at *4* different versions :p" },
    { crate = "rand@0.8.5", reason = "several users of old version in corrosion crates" },
    { crate = "sha2@0.10.9", reason = "old version that uses multiple other old crates" },
]

[[bans.features]]
name = "rustls"
deny = ["aws_lc_rs", "aws-lc-rs"]

[[bans.features]]
name = "tokio-rustls"
deny = ["aws-lc-rs"]

[[bans.features]]
name = "rustls-webpki"
deny = ["aws-lc-rs"]

[bans.workspace-dependencies]
unused = 'allow'

# This section is considered when running `cargo deny check licenses`
# More documentation for the licenses section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
allow = ["Apache-2.0", "MIT", "ISC", "BSD-3-Clause", "Unicode-3.0"]
exceptions = [
    { crate = "adler32", allow = ["Zlib"] },
    { crate = "foldhash", allow = ["Zlib"] },
    # This license should not really be used for code, but here we are
    { crate = "notify", allow = ["CC0-1.0"] },
    { crate = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
    { crate = "ar_archive_writer", allow = ["Apache-2.0 WITH LLVM-exception"] },
    { crate = "foca", allow = ["MPL-2.0"] },
    { crate = "enquote", allow = ["Unlicense"] },
]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c },
]

[sources.allow-org]
github = ["EmbarkStudios"]